version: '3.8'
services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      # Configuration des deux réseaux : interne (29092) et externe (9092)
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
    networks:
      - poc-network

  producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    depends_on:
      - redpanda
    networks:
      - poc-network

  spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
    depends_on:
      - redpanda
    volumes:
      # On lie les dossiers locaux aux dossiers du conteneur pour récupérer les Parquets
      - ./output_data:/app/output_data
      - ./checkpoints:/app/checkpoints
    networks:
      - poc-network

networks:
  poc-network:
    driver: bridge